<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D0D;
      color: #E5E5E5;
      overflow: hidden;
    }
    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #222;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 12px;
      color: #888;
    }
    .content { padding: 20px; }
    .section {
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      margin-bottom: 10px;
    }
    .capture-modes {
      display: flex;
      gap: 8px;
    }
    .capture-btn {
      flex: 1;
      padding: 12px 8px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #1A1A1A;
      color: #E5E5E5;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .capture-btn:hover {
      border-color: #667eea;
      background: #1E1E2E;
    }
    .capture-btn:active {
      transform: scale(0.97);
    }
    .capture-btn .icon {
      font-size: 24px;
      display: block;
      margin-bottom: 6px;
    }
    .capture-btn .shortcut {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
    .device-selector {
      display: flex;
      gap: 8px;
    }
    .device-btn {
      flex: 1;
      padding: 8px;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1A1A1A;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .device-btn.active {
      border-color: #667eea;
      color: #E5E5E5;
      background: #1E1E2E;
    }
    .status-bar {
      padding: 16px 20px;
      border-top: 1px solid #222;
      display: none;
    }
    .status-bar.visible { display: block; }
    .progress-bar {
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 2px;
      transition: width 0.3s;
      width: 0%;
    }
    .status-text {
      font-size: 12px;
      color: #888;
    }
    .status-text.error { color: #ff5555; }
    .status-text.success { color: #50fa7b; }
    .footer {
      padding: 12px 20px;
      border-top: 1px solid #222;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #667eea;
      text-decoration: none;
    }
    .mcp-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1E1E2E;
      border: 1px solid #333;
      font-size: 10px;
      color: #667eea;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Web2Fig</h1>
    <p>Convert any web page to Figma</p>
    <div class="mcp-badge">MCP Enabled</div>
  </div>

  <div class="content">
    <div class="section">
      <div class="section-title">Capture Mode</div>
      <div class="capture-modes">
        <button class="capture-btn" id="btn-full">
          <span class="icon">📄</span>
          Full Page
          <div class="shortcut">Alt+Shift+F</div>
        </button>
        <button class="capture-btn" id="btn-viewport">
          <span class="icon">🖥️</span>
          Viewport
          <div class="shortcut">Alt+Shift+V</div>
        </button>
        <button class="capture-btn" id="btn-selection">
          <span class="icon">✂️</span>
          Selection
        </button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Device Type</div>
      <div class="device-selector">
        <button class="device-btn active" data-device="desktop">🖥 Desktop</button>
        <button class="device-btn" data-device="tablet">📱 Tablet</button>
        <button class="device-btn" data-device="mobile">📲 Mobile</button>
      </div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="status-text" id="status-text">Capturing...</div>
  </div>

  <div class="footer">
    <a href="#">Upload .w2f to Figma Plugin →</a>
  </div>
</body>
</html>
